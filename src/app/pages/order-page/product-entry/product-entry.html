  <div class="cart-item-main">
    <div class="cart-item-image">
      <img [ngSrc]="this.product!.imageUrl" width="80" height="80" alt="Product">
    </div>
    <div class="cart-item-info">
      <div class="cart-item-name">{{product?.name}}</div>
      <div class="cart-item-category">{{product?.category}}</div>
      <button class="cart-item-remove" (click)="onGarbageClick()">
        <span class="cart-item-remove-icon-mobile">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2 lucide-trash-2 w-4 h-4"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
        </span>
        <span class="cart-item-remove-text">Remove</span>
      </button>
    </div>
  </div>

  <div class="cart-item-price-row">
    <span class="cart-item-price-label">Price:</span>
    <span class="cart-item-price-value">${{product?.price}}</span>
  </div>

  <div class="cart-item-quantity-row">
    <div class="cart-item-quantity-control">
      <button class="cart-item-quantity-btn"(click)="onMinusClick()">-</button>
      <span class="cart-item-quantity">{{productEntry().quantity()}}</span>
      <button class="cart-item-quantity-btn" (click)="onPlusClick()">+</button>
    </div>
  </div>

  <div class="cart-item-total-row">
    <span class="cart-item-total-label">Total:</span>
    <span class="cart-item-total-value">${{product!.price * productEntry().quantity()}}</span>
    <span class="cart-item-remove-icon cart-item-remove-desktop" (click)="onGarbageClick()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2 lucide-trash-2 w-4 h-4"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
    </span>
  </div>
