<div class="container">
    <h1>Building Materials</h1>
    <p class="subtitle">Premium construction supplies for all your projects</p>

    <div class="filter-sort-bar">
        <div class="filter-show">
            <button class="show-filters-btn" (click)="onFilterClick()">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sliders-horizontal w-4 h-4"><line x1="21" x2="14" y1="4" y2="4"></line><line x1="10" x2="3" y1="4" y2="4"></line><line x1="21" x2="12" y1="12" y2="12"></line><line x1="8" x2="3" y1="12" y2="12"></line><line x1="21" x2="16" y1="20" y2="20"></line><line x1="12" x2="3" y1="20" y2="20"></line><line x1="14" x2="14" y1="2" y2="6"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="16" x2="16" y1="18" y2="22"></line></svg></span>
                Show Filters
            </button>
            <span class="showing-products">Showing {{filter.filteredCount()}} products</span>
        </div>        
        <div class="sort-section">
            <span class="sort-label">Sort by:</span>
            <app-sort-component/>
        </div>
    </div>

    <div class="margin-filter filter" [class.active]="showFilter">
        <app-filter-component/>
    </div>
    <div class="products">
        <app-product-list-component (addToCartEvent)="onAddProductToCart($event)"/>
    </div>
</div>
