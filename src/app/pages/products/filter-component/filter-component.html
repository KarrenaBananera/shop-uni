<div class="filter-container">
  <div class="filter-group">
    <div class="filter-label">Minimum Rating</div>
    <div class="checkboxes">   
      <button class="checkboxe"
              [class.active]="selectedRating === '5'"
              (click)="selectRating('5')"
              >
    <span>5+ Stars</span>

      </button>
      <button class="checkboxe"
              [class.active]="selectedRating === '4'"
              (click)="selectRating('4')"
              >
        <span>4+ Stars</span>

      </button>

      <button class="checkboxe"
              [class.active]="selectedRating === '3'"
              (click)="selectRating('3')"
             >
            <span>3+ Stars</span>
      </button>
    </div>
  </div>


  <div class="filter-group">
    <div class="filter-label">Price range</div>
    <div class="slider-container">
      <mat-slider min="0" max="500" step="10" discrete>
        <input matSliderStartThumb (valueChange)="onStartChange($event)">
        <input matSliderEndThumb (valueChange)="onEndChange($event)">
      </mat-slider>
      <div class="price-labels">
        <span>${{startPrice}}</span>
        <span>${{endPrice}}</span>
      </div>
    </div>
  </div> 

  <div class="filter-group button-group">
    <div class="filter-label" style="visibility: hidden; height: 0; margin: 0;"> </div>
    <button class="clear-btn">Clear All Filters</button>
  </div>
</div>
